<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Styleguide</title>
  <link href="./css/reset.css" rel="stylesheet" type="text/css" />
  <link href="./css/style.css" rel="stylesheet" type="text/css" />
</head>
<body>

  <section>
    <h1>Typography: Montserrat</h1>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <p>Paragraph text. <strong>Bold</strong>, <em>Italic</em>, <a href="https://fonts.google.com/selection/embed">Link</a></p>
    
  </section>

  <section>
    <h1>Buttons</h1>
    <button class="primary-active">Primary Active</button>
    <button class="primary-hover">Primary Hover</button>
    <button class="primary-inactive">Primary Inactive</button>
    <button class="secondary-active">Secondary Active</button>
    <button class="secondary-hover">Secondary Hover</button>
    <button class="secondary-inactive">Secondary Inactive</button>
    <button class="t-active">Third Active</button>
    <button class="t-hover">Third Hover</button>
    <button class="t-inactive">Third Inactive</button>
  </section>

  </body>
</html>
